<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 980 300" width="980" height="300">
  <defs>
    <marker id="ar2" markerWidth="10" markerHeight="10" refX="8" refY="4" orient="auto"><path d="M0 0 L8 4 L0 8 z" fill="#2a9d68"/></marker>
  </defs>
  <rect width="980" height="300" fill="#0b1220"/>
  <text x="490" y="28" text-anchor="middle" font-family="Helvetica,Arial" font-size="17" font-weight="bold" fill="#43f59b">Out-of-the-box training: four stages, ~15 minutes per room (ADR-135 + ADR-151)</text>

  <rect x="20" y="60" width="215" height="105" rx="10" fill="#0e2a1c" stroke="#43f59b" stroke-width="1.5"/>
  <text x="127" y="84" text-anchor="middle" font-family="Helvetica,Arial" font-size="13" font-weight="bold" fill="#43f59b">1 · Calibrate (empty)</text>
  <text x="127" y="104" text-anchor="middle" font-family="Helvetica,Arial" font-size="10.5" fill="#d7ffe9">wifi-densepose calibrate</text>
  <text x="127" y="121" text-anchor="middle" font-family="Helvetica,Arial" font-size="10.5" fill="#d7ffe9">leave the room · 30–60 s</text>
  <text x="127" y="138" text-anchor="middle" font-family="Helvetica,Arial" font-size="10.5" fill="#d7ffe9">empty-room RF fingerprint</text>
  <text x="127" y="155" text-anchor="middle" font-family="Helvetica,Arial" font-size="10" font-style="italic" fill="#8fb8a4">redo after moving furniture</text>

  <rect x="270" y="60" width="215" height="105" rx="10" fill="#0e2a1c" stroke="#43f59b" stroke-width="1.5"/>
  <text x="377" y="84" text-anchor="middle" font-family="Helvetica,Arial" font-size="13" font-weight="bold" fill="#43f59b">2 · Enroll (guided)</text>
  <text x="377" y="104" text-anchor="middle" font-family="Helvetica,Arial" font-size="10.5" fill="#d7ffe9">wifi-densepose enroll</text>
  <text x="377" y="121" text-anchor="middle" font-family="Helvetica,Arial" font-size="10.5" fill="#d7ffe9">8 anchor poses · ~4 min</text>
  <text x="377" y="138" text-anchor="middle" font-family="Helvetica,Arial" font-size="10.5" fill="#d7ffe9">stand · sit · lie · walk · breathe…</text>
  <text x="377" y="155" text-anchor="middle" font-family="Helvetica,Arial" font-size="10" font-style="italic" fill="#8fb8a4">quality-gated, retries noisy anchors</text>

  <rect x="520" y="60" width="215" height="105" rx="10" fill="#0e2a1c" stroke="#43f59b" stroke-width="1.5"/>
  <text x="627" y="84" text-anchor="middle" font-family="Helvetica,Arial" font-size="13" font-weight="bold" fill="#43f59b">3 · Train specialists</text>
  <text x="627" y="104" text-anchor="middle" font-family="Helvetica,Arial" font-size="10.5" fill="#d7ffe9">wifi-densepose train-room</text>
  <text x="627" y="121" text-anchor="middle" font-family="Helvetica,Arial" font-size="10.5" fill="#d7ffe9">6 small models, 2–12 KB each</text>
  <text x="627" y="138" text-anchor="middle" font-family="Helvetica,Arial" font-size="10.5" fill="#d7ffe9">over a frozen backbone</text>
  <text x="627" y="155" text-anchor="middle" font-family="Helvetica,Arial" font-size="10" font-style="italic" fill="#8fb8a4">seconds, on-device class compute</text>

  <rect x="770" y="60" width="190" height="105" rx="10" fill="#10243a" stroke="#5cd6ff" stroke-width="1.5"/>
  <text x="865" y="84" text-anchor="middle" font-family="Helvetica,Arial" font-size="13" font-weight="bold" fill="#5cd6ff">4 · Watch (live)</text>
  <text x="865" y="104" text-anchor="middle" font-family="Helvetica,Arial" font-size="10.5" fill="#cfe3f5">wifi-densepose room-watch</text>
  <text x="865" y="121" text-anchor="middle" font-family="Helvetica,Arial" font-size="10.5" fill="#cfe3f5">mixture-of-specialists</text>
  <text x="865" y="138" text-anchor="middle" font-family="Helvetica,Arial" font-size="10.5" fill="#cfe3f5">anomaly head can veto</text>
  <text x="865" y="155" text-anchor="middle" font-family="Helvetica,Arial" font-size="10" font-style="italic" fill="#8fb8a4">room-status = health check</text>

  <line x1="235" y1="112" x2="266" y2="112" stroke="#2a9d68" stroke-width="2" marker-end="url(#ar2)"/>
  <line x1="485" y1="112" x2="516" y2="112" stroke="#2a9d68" stroke-width="2" marker-end="url(#ar2)"/>
  <line x1="735" y1="112" x2="766" y2="112" stroke="#2a9d68" stroke-width="2" marker-end="url(#ar2)"/>

  <!-- six specialists -->
  <text x="490" y="210" text-anchor="middle" font-family="Helvetica,Arial" font-size="12" font-weight="bold" fill="#43f59b">The six room specialists produced by stage 3:</text>
  <g font-family="Helvetica,Arial" font-size="11" fill="#d7ffe9" text-anchor="middle">
    <rect x="105" y="228" width="115" height="34" rx="7" fill="#0e2a1c" stroke="#2a9d68"/><text x="162" y="249">presence</text>
    <rect x="235" y="228" width="115" height="34" rx="7" fill="#0e2a1c" stroke="#2a9d68"/><text x="292" y="249">posture</text>
    <rect x="365" y="228" width="115" height="34" rx="7" fill="#0e2a1c" stroke="#2a9d68"/><text x="422" y="249">breathing</text>
    <rect x="495" y="228" width="115" height="34" rx="7" fill="#0e2a1c" stroke="#2a9d68"/><text x="552" y="249">heartbeat</text>
    <rect x="625" y="228" width="115" height="34" rx="7" fill="#0e2a1c" stroke="#2a9d68"/><text x="682" y="249">restlessness</text>
    <rect x="755" y="228" width="115" height="34" rx="7" fill="#0e2a1c" stroke="#ffb454"/><text x="812" y="249" fill="#ffb454">anomaly (veto)</text>
  </g>
</svg>
