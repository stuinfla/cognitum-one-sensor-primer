name: Update RuView submodule

on:
  schedule:
    - cron: '17 6 * * *'   # daily at 06:17 UTC (odd minute avoids GitHub's top-of-hour congestion)
  workflow_dispatch:        # allow manual runs from the Actions tab

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Update RuView and ruvector to latest upstream main
        run: git submodule update --remote RuView ruvector

      - name: Commit and push if either submodule moved
        run: |
          if git diff --quiet RuView ruvector; then
            echo "Submodules already up to date."
            exit 0
          fi
          RV_DESC=$(git -C RuView describe --tags --always)
          RVEC_SHA=$(git -C ruvector rev-parse --short HEAD)
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add RuView ruvector
          git commit -m "Bump submodules: RuView ${RV_DESC}, ruvector ${RVEC_SHA}"
          git push
